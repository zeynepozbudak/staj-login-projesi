<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - The Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-lg flex w-full max-w-4xl overflow-hidden">
        
        <div class="w-1/2 bg-blue-600 p-12 text-white flex flex-col justify-center hidden md:flex">
            <h2 class="text-3xl font-bold mb-4">Aramıza Katılın!</h2>
            <p class="text-blue-100 mb-6">Projelere erişmek için hesabınızı hemen oluşturun.</p>
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/sign-up-page-4468582-3783955.png" alt="Register" class="w-full object-cover">
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Kayıt Ol</h2>
            <p class="text-gray-500 mb-6">Hızlıca hesabınızı oluşturun.</p>

            <form id="registerForm" class="flex flex-col gap-4">
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="firstName">Ad</label>
                        <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200" type="text" id="firstName" required>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="lastName">Soyad</label>
                        <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200" type="text" id="lastName" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">E-posta</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200" type="email" id="email" required>
                </div>

                <div class="relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Şifre</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200" type="password" id="password" required>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2">
                    Kayıt Ol
                </button>
            </form>

            <p class="text-center text-gray-600 mt-6 text-sm">
                Zaten hesabınız var mı? <a href="index.html" class="text-blue-600 font-semibold hover:underline">Giriş Yap</a>
            </p>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
