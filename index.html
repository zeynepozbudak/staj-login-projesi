<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - The Flower Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- İkonlar (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- SweetAlert2 (Şık Uyarılar) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-lg flex w-full max-w-4xl overflow-hidden">
        
        <!-- Sol Taraf: Görsel -->
        <div class="w-1/2 bg-blue-600 p-12 text-white flex flex-col justify-center hidden md:flex">
            <h2 class="text-3xl font-bold mb-4">Hoş Geldiniz!</h2>
            <p class="text-blue-100 mb-6">Lütfen devam etmek için giriş yapın.</p>
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/login-page-4468581-3783954.png" alt="Login İllüstrasyon" class="w-full object-cover">
        </div>

        <!-- Sağ Taraf: Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Giriş Yap</h2>
            <p class="text-gray-500 mb-8">Minimum gereksinimlere uygun giriş ekranı.</p>

            <form id="loginForm" class="flex flex-col gap-4">
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">E-posta Adresi</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200 focus:outline-none focus:border-blue-500" type="email" id="email" placeholder="ornek@mail.com" required>
                </div>

                <div class="relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Şifre</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200 focus:outline-none focus:border-blue-500" type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye absolute right-4 top-11 text-gray-400 cursor-pointer hover:text-blue-500" id="togglePassword"></i>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-4">
                    Giriş Yap
                </button>
                
            </form>

            <p class="text-center text-gray-600 mt-8 text-sm">
                Hesabınız yok mu? <a href="register.html" class="text-blue-600 font-semibold hover:underline">Hemen Kayıt Olun</a>
            </p>
        </div>
    </div>

    <!-- Vite'ın kendi JS dosyasına bağlıyoruz -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
