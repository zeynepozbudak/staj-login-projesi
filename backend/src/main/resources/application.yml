spring:
  application:
    name: VBT_staj_LoginProject

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vbt_login_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:login1234}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:sSvhRTo1g9WoO8uOtNRtA7r1VOVStxcqBeN6ZkAxxS3}
  access-token-expiration: 900000       # 15 dakika
  refresh-token-expiration: 604800000   # 7 gun


server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor: TRACE
    com.vbt.vbt_staj_loginproject: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
